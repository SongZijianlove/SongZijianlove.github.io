<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>致陈妍琦｜宋子健</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#fff5f8;
            font-family:"微软雅黑",sans-serif;

        h1{

            width:360px;
            border-radius:18px;

        }
        audio{margin-top:10px}

<body>
    <h1>致 陈妍琦 💌</h1>
    <div class="love-text">
        看过你写的所有心绪，也明白你一直困在这份拉扯里。<br>
        爱从不需要一个决绝的放手理由，遗憾本就是常态。<br>
        不必致歉，不必内耗，慢慢放下牵绊，<br>
        我们都会拥有属于自己的自在，祝前路皆安。
    </div>
    <img src="love.jpg" alt="我们">
    <audio controls autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
